<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>소제동 성향 테스트</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; padding: 20px; line-height: 1.6; }
        .question { margin-bottom: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 10px; }
        button { display: block; width: 100%; margin: 5px 0; padding: 10px; cursor: pointer; }
        #result { margin-top: 20px; padding: 20px; background: #f9f9f9; display: none; }
    </style>
</head>
<body>
    <h1>소제동 성향 테스트</h1>
    <div id="quiz"></div>
    <button onclick="calculate()">결과 보기</button>
    <div id="result"></div>

    <script>
        const questions = [
            "새로운 동네에 도착했다.", "주말 약속이 생겼다.", "여행 계획을 세울 때", 
            "SNS에서 여행 영상을 본다면", "친구가 즉흥 여행을 제안했다.", "소제동에서 더 끌리는 것은?",
            "사진을 찍는다면", "비 오는 날 여행이라면", "여행 중 예상치 못한 행사를 발견했다.", "여행의 목적은?"
        ];
        const options = [
            ["일단 사람 많은 곳부터 가본다.", "조용한 골목부터 걸어본다."],
            ["다양한 활동을 하고 싶다.", "한 곳에서 여유롭게 시간을 보내고 싶다."],
            ["최대한 많은 장소를 넣는다.", "몇 군데만 정하고 천천히 둘러본다."],
            ["축제나 행사 영상이 좋다.", "감성 브이로그가 좋다."],
            ["좋다! 바로 가자.", "조금 고민해보고 결정한다."],
            ["체험 프로그램", "전시 공간"],
            ["사람들과 함께 찍는다.", "풍경 위주로 찍는다."],
            ["그래도 돌아다닌다.", "실내 공간을 찾는다."],
            ["바로 참여한다.", "구경만 한다."],
            ["새로운 경험", "휴식과 여유"]
        ];

        let scores = new Array(10).fill(0);
        const quizDiv = document.getElementById('quiz');

        questions.forEach((q, i) => {
            quizDiv.innerHTML += `<div class='question'><p>${i+1}. ${q}</p>
                <button onclick="scores[${i}]=1; this.style.background='pink'">🅰️ ${options[i][0]}</button>
                <button onclick="scores[${i}]=-1; this.style.background='skyblue'">🅱️ ${options[i][1]}</button></div>`;
        });

        function calculate() {
            let total = scores.reduce((a, b) => a + b, 0);
            let resDiv = document.getElementById('result');
            let content = "";
            if(total >= 8) content = "<h3>🎉 결과 1: 소제동 에너자이저</h3><p>활동성: ★★★★★<br>추천: 동구동락 축제 #축제 #체험 #공연 #플리마켓</p>";
            else if(total >= 4) content = "<h3>🎉 결과 2: 트렌드 탐험가</h3><p>활동성: ★★★★☆<br>추천: 팝업스토어 #팝업 #체험 #신규브랜드 #이벤트</p>";
            else if(total >= -3) content = "<h3>🎉 결과 3: 감성 수집가</h3><p>활동성: ★★★☆☆<br>추천: 카페 #카페투어 #브런치 #철길뷰 #감성</p>";
            else if(total >= -7) content = "<h3>🎉 결과 4: 문화 산책가</h3><p>활동성: ★★☆☆☆<br>추천: 전시 #전시 #문화공간 #독립서점 #아트</p>";
            else content = "<h3>🎉 결과 5: 골목 사색가</h3><p>활동성: ★☆☆☆☆<br>추천: 소제동 벽화거리 #산책 #벽화 #골목 #포토스팟</p>";
            
            resDiv.innerHTML = content;
            resDiv.style.display = "block";
        }
    </script>
</body>
</html>
